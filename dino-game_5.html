<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHROMARUN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    transition: background 1.2s ease;
  }

  #ui-top {
    width: 900px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  #game-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    transition: color 1.2s ease, text-shadow 1.2s ease;
  }

  #score-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  #score-display {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    transition: color 1.2s ease;
  }

  #hi-score {
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.45;
    transition: color 1.2s ease;
  }

  #canvas-wrapper {
    position: relative;
    border: 2px solid #333;
    transition: border-color 1.2s ease, box-shadow 1.2s ease;
  }

  canvas { display: block; }

  #theme-label {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.55;
    transition: color 1.2s ease, opacity 0.3s;
  }

  #controls {
    margin-top: 8px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.3;
    transition: color 1.2s ease;
  }

  #copyright {
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 4px;
    opacity: 0.2;
    transition: color 1.2s ease;
    text-transform: uppercase;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.78);
    z-index: 10;
  }

  #overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 6px;
    transition: color 1.2s ease, text-shadow 1.2s ease;
  }

  #overlay-sub {
    font-size: 12px;
    letter-spacing: 4px;
    opacity: 0.65;
    margin-bottom: 24px;
    transition: color 1.2s ease;
  }

  #start-btn {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 12px 34px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #start-btn:hover { transform: scale(1.06); filter: brightness(1.3); }

  /* milestone banner */
  #milestone-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    transition: color 1.2s ease, text-shadow 1.2s ease;
  }

  #milestone-banner.pop {
    animation: milestonePop 1.4s ease forwards;
  }

  @keyframes milestonePop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    50%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
  }

  @keyframes scorePulse {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.25); }
    60%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .score-pulse { animation: scorePulse 0.35s ease; }

  @keyframes borderFlare {
    0%   { opacity: 1; }
    50%  { opacity: 0.1; }
    100% { opacity: 1; }
  }
  .border-flare { animation: borderFlare 0.4s ease; }
</style>
</head>
<body>

<div id="ui-top">
  <div id="game-title">CHROMARUN</div>
  <div id="score-wrap">
    <div id="score-display">000000</div>
    <div id="hi-score">BEST: 000000</div>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="gameCanvas" width="900" height="340"></canvas>
  <div id="milestone-banner">PHASE SHIFT</div>
  <div id="overlay">
    <div id="overlay-title">CHROMARUN</div>
    <div id="overlay-sub">COLOR EVOLVES EVERY 250 PTS</div>
    <button id="start-btn" onclick="startGame()">PRESS SPACE / TAP</button>
  </div>
</div>

<div id="theme-label">PHASE: VOID</div>
<div id="controls">SPACE / UP — JUMP &nbsp;·&nbsp; DOWN — DUCK</div>
<div id="copyright">© mrmiprox</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 340;
const GROUND_Y = 278;

// ─── HIDPI / RETINA SCALING ───────────────────────────────
(function scaleCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
})();

// ─── THEMES ───────────────────────────────────────────────
const themes = [
  { name:'VOID',       bg:'#0a0a0a', ground:'#2e2e2e', dino:'#888888', obstacle:'#606060', accent:'#888888', glow:'rgba(136,136,136,0.3)', bodyBg:'#0a0a0a', border:'#2e2e2e', star:'#444' },
  { name:'EMBER',      bg:'#0f0600', ground:'#7a3200', dino:'#ff6a00', obstacle:'#cc4400', accent:'#ff6a00', glow:'rgba(255,106,0,0.55)',  bodyBg:'#0a0400', border:'#ff6a00', star:'#5a2200' },
  { name:'NEON OCEAN', bg:'#00070f', ground:'#004466', dino:'#00d4ff', obstacle:'#0088bb', accent:'#00d4ff', glow:'rgba(0,212,255,0.55)',  bodyBg:'#00050f', border:'#00d4ff', star:'#003344' },
  { name:'TOXIC',      bg:'#020f00', ground:'#1a5200', dino:'#39ff14', obstacle:'#22cc00', accent:'#39ff14', glow:'rgba(57,255,20,0.55)',  bodyBg:'#010900', border:'#39ff14', star:'#0a3300' },
  { name:'VORTEX',     bg:'#07000f', ground:'#3d0066', dino:'#bf00ff', obstacle:'#8800cc', accent:'#bf00ff', glow:'rgba(191,0,255,0.55)', bodyBg:'#050010', border:'#bf00ff', star:'#25003d' },
  { name:'INFERNO',    bg:'#0f000a', ground:'#660033', dino:'#ff0077', obstacle:'#cc0055', accent:'#ff0077', glow:'rgba(255,0,119,0.55)', bodyBg:'#0a0005', border:'#ff0077', star:'#3d0020' },
  { name:'SOLAR',      bg:'#0f0900', ground:'#665500', dino:'#ffd700', obstacle:'#cc9900', accent:'#ffd700', glow:'rgba(255,215,0,0.65)', bodyBg:'#090700', border:'#ffd700', star:'#3d3000' },
];

let theme = themes[0], themeIndex = 0;

function applyTheme(t, milestone) {
  document.body.style.background = t.bodyBg;
  document.getElementById('game-title').style.color = t.accent;
  document.getElementById('game-title').style.textShadow = `0 0 22px ${t.glow}`;
  document.getElementById('score-display').style.color = t.accent;
  document.getElementById('hi-score').style.color = t.accent;
  document.getElementById('canvas-wrapper').style.borderColor = t.border;
  document.getElementById('canvas-wrapper').style.boxShadow = `0 0 28px ${t.glow}, 0 0 55px ${t.glow}`;
  document.getElementById('theme-label').style.color = t.accent;
  document.getElementById('controls').style.color = t.accent;
  document.getElementById('copyright').style.color = t.accent;
  document.getElementById('overlay-title').style.color = t.accent;
  document.getElementById('overlay-title').style.textShadow = `0 0 30px ${t.glow}`;
  document.getElementById('overlay-sub').style.color = t.accent;
  document.getElementById('start-btn').style.color = t.accent;
  document.getElementById('start-btn').style.borderColor = t.accent;
  document.getElementById('start-btn').style.boxShadow = `0 0 18px ${t.glow}`;
  document.getElementById('theme-label').textContent = `PHASE: ${t.name}`;
  const banner = document.getElementById('milestone-banner');
  banner.style.color = t.accent;
  banner.style.textShadow = `0 0 30px ${t.glow}, 0 0 60px ${t.glow}`;

  if (milestone) {
    banner.textContent = `⚡ ${t.name} ⚡`;
    banner.classList.remove('pop');
    void banner.offsetWidth;
    banner.classList.add('pop');
    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.classList.remove('border-flare');
    void wrapper.offsetWidth;
    wrapper.classList.add('border-flare');
    spawnBurst();
  }
}

// ─── PARTICLES ────────────────────────────────────────────
const particles = [];

function spawnBurst() {
  for (let i = 0; i < 40; i++) {
    const angle = (Math.PI * 2 / 40) * i + Math.random() * 0.2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x: dino.x + dino.w / 2,
      y: dino.y - dino.h / 2,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.022 + Math.random() * 0.02,
      size: 2 + Math.random() * 3,
    });
  }
}

function spawnTrail() {
  if (Math.random() > 0.4) return;
  particles.push({
    x: dino.x + Math.random() * dino.w * 0.4,
    y: dino.y - Math.random() * dino.h,
    vx: -0.5 - Math.random() * 1,
    vy: -0.3 + Math.random() * 0.6,
    life: 0.7,
    decay: 0.045,
    size: 1.5 + Math.random() * 2,
    trail: true,
  });
}

function spawnLandPuff() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: dino.x + 10 + Math.random() * 20,
      y: GROUND_Y,
      vx: -1 - Math.random() * 2,
      vy: -1 - Math.random() * 2,
      life: 0.9,
      decay: 0.06,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); }
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.shadowColor = theme.glow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.trail ? theme.dino : theme.accent;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ─── STARS ────────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (GROUND_Y - 60), r: Math.random() * 1.6, twinkle: Math.random() * Math.PI * 2 });
}

function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.03;
    const a = 0.2 + Math.abs(Math.sin(s.twinkle)) * 0.5;
    ctx.globalAlpha = a;
    ctx.fillStyle = theme.star;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── DINO ─────────────────────────────────────────────────
const dino = {
  x: 80, y: GROUND_Y, w: 40, h: 50,
  vy: 0, gravity: 0.65,
  jumping: false, ducking: false,
  wasJumping: false,
  legFrame: 0,
  reset() { this.y = GROUND_Y; this.vy = 0; this.jumping = false; this.ducking = false; this.wasJumping = false; this.dead = false; },
  jump() {
    if (!this.jumping && !this.ducking) { this.vy = -17; this.jumping = true; }
  },
  duck(active) { if (!this.jumping) this.ducking = active; },
  update() {
    if (this.dead) return;
    this.wasJumping = this.jumping;
    if (this.jumping) {
      this.vy += this.gravity;
      this.y += this.vy;
      if (this.y >= GROUND_Y) {
        this.y = GROUND_Y; this.vy = 0; this.jumping = false;
        if (this.wasJumping) spawnLandPuff();
      }
      spawnTrail();
    }
    if (!this.jumping) this.legFrame = (this.legFrame + 0.28) % 2;
  },
  get rect() {
    const h = this.ducking ? 28 : this.h;
    const yOff = this.ducking ? 22 : 0;
    return { x: this.x + 4, y: this.y - h + yOff, w: this.w - 8, h };
  },
  draw() {
    const c = theme.dino;
    ctx.shadowColor = theme.glow;
    ctx.shadowBlur = 18;
    ctx.fillStyle = c;

    if (this.ducking) {
      ctx.fillRect(this.x, this.y - 28, 50, 28);
      ctx.fillRect(this.x + 50, this.y - 18, 14, 18);
      ctx.fillStyle = theme.bg;
      ctx.shadowBlur = 0;
      ctx.fillRect(this.x + 52, this.y - 15, 5, 5);
      ctx.fillStyle = c;
      ctx.shadowColor = theme.glow;
      ctx.shadowBlur = 18;
      const lf = Math.floor(this.legFrame);
      ctx.fillRect(this.x + 8  + (lf === 0 ? -4 : 4), this.y, 10, 10);
      ctx.fillRect(this.x + 28 + (lf === 0 ? 4 : -4), this.y, 10, 10);
    } else {
      // head
      ctx.fillRect(this.x + 14, this.y - this.h, 26, 20);
      // eye
      ctx.fillStyle = theme.bg;
      ctx.shadowBlur = 0;
      if (this.dead) {
        // X eyes
        ctx.strokeStyle = theme.accent;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(this.x+28, this.y-this.h+4); ctx.lineTo(this.x+34, this.y-this.h+10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.x+34, this.y-this.h+4); ctx.lineTo(this.x+28, this.y-this.h+10); ctx.stroke();
      } else {
        ctx.fillRect(this.x + 30, this.y - this.h + 5, 5, 5);
        // eye glow dot
        ctx.fillStyle = theme.accent;
        ctx.fillRect(this.x + 31, this.y - this.h + 6, 2, 2);
      }
      ctx.fillStyle = c;
      ctx.shadowColor = theme.glow;
      ctx.shadowBlur = 18;
      // body
      ctx.fillRect(this.x, this.y - this.h + 20, 40, 28);
      // tail
      ctx.fillRect(this.x - 14, this.y - this.h + 30, 18, 10);
      // legs
      const lf = this.dead ? 0 : Math.floor(this.legFrame);
      ctx.fillRect(this.x + 6  + (lf === 0 ? -5 : 5), this.y - 10, 10, 20);
      ctx.fillRect(this.x + 22 + (lf === 0 ? 5 : -5), this.y - 10, 10, 20);
    }
    ctx.shadowBlur = 0;
  }
};

// ─── OBSTACLES ────────────────────────────────────────────
const obstacles = [];
let obstacleTimer = 0, nextObstacleIn = 90;

function spawnObstacle() {
  const roll = Math.random();
  if (roll < 0.65) {
    const count = Math.random() < 0.4 ? 2 : 1;
    const w = count === 2 ? 20 : 12;
    obstacles.push({ type:'cactus', x:820, y:GROUND_Y - 50, w, h:50 });
  } else {
    const yOptions = [GROUND_Y - 105, GROUND_Y - 65, GROUND_Y - 38];
    const y = yOptions[Math.floor(Math.random() * yOptions.length)];
    obstacles.push({ type:'bird', x:820, y, w:26, h:20, wingUp:true, wingTimer:0 });
  }
}

function drawCactus(o) {
  ctx.shadowColor = theme.glow;
  ctx.shadowBlur = 12;
  ctx.fillStyle = theme.obstacle;
  const mx = o.x + o.w / 2;
  ctx.fillRect(mx - 5, o.y - o.h + 18, 10, o.h);
  ctx.fillRect(mx - 7, o.y - o.h, 14, 18);
  if (o.w > 15) {
    ctx.fillRect(o.x + o.w - 5, o.y - o.h + 26, 8, o.h - 6);
    ctx.fillRect(o.x + o.w - 7, o.y - o.h + 10, 12, 16);
    ctx.fillRect(mx + 5, o.y - o.h + 28, o.w / 2 - 3, 6);
  } else {
    ctx.fillRect(o.x, o.y - o.h + 28, o.w / 2 - 5, 6);
    ctx.fillRect(o.x, o.y - o.h + 16, 6, 16);
    ctx.fillRect(mx + 5, o.y - o.h + 28, o.w / 2 - 5, 6);
    ctx.fillRect(o.x + o.w - 6, o.y - o.h + 16, 6, 16);
  }
  ctx.shadowBlur = 0;
}

function drawBird(o) {
  ctx.shadowColor = theme.glow;
  ctx.shadowBlur = 14;
  ctx.fillStyle = theme.obstacle;
  ctx.fillRect(o.x + 6, o.y + 5, 18, 10);
  ctx.fillRect(o.x + 20, o.y + 1, 10, 10);
  ctx.fillRect(o.x + 29, o.y + 5, 6, 3);
  if (o.wingUp) {
    ctx.fillRect(o.x,      o.y - 8,  16, 8);
    ctx.fillRect(o.x + 14, o.y - 12, 8,  6);
  } else {
    ctx.fillRect(o.x,      o.y + 14, 16, 8);
    ctx.fillRect(o.x + 14, o.y + 16, 8,  6);
  }
  ctx.shadowBlur = 0;
}

// ─── CLOUDS ───────────────────────────────────────────────
const clouds = [];
for (let i = 0; i < 6; i++) {
  clouds.push({ x:Math.random()*W, y:25+Math.random()*55, w:50+Math.random()*70, spd:0.3+Math.random()*0.35 });
}

// ─── GROUND LINES ─────────────────────────────────────────
const groundLines = [];
for (let i = 0; i < 22; i++) groundLines.push({ x:Math.random()*W, w:5+Math.random()*22 });

// ─── SCORE MILESTONES ─────────────────────────────────────
const milestoneScores = new Set();

function checkMilestone(score) {
  const mark = Math.floor(score / 100) * 100;
  if (mark > 0 && mark % 100 === 0 && !milestoneScores.has(mark)) {
    milestoneScores.add(mark);
    // pulse score
    const sd = document.getElementById('score-display');
    sd.classList.remove('score-pulse');
    void sd.offsetWidth;
    sd.classList.add('score-pulse');
  }
}

// ─── HELPERS ──────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function checkTheme() {
  const idx = Math.min(Math.floor(score / 250), themes.length - 1);
  if (idx !== themeIndex) {
    themeIndex = idx;
    theme = themes[themeIndex];
    applyTheme(theme, true);
  }
}

// ─── DRAW SCENE ───────────────────────────────────────────
let score = 0, hiScore = 0, speed = 3, frame = 0;
let gameRunning = false, raf;

function drawScene() {
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  drawStars();

  // clouds
  ctx.shadowColor = theme.glow;
  ctx.shadowBlur = 4;
  ctx.fillStyle = theme.ground;
  clouds.forEach(c => {
    ctx.globalAlpha = 0.35;
    ctx.fillRect(c.x, c.y, c.w, 10);
    ctx.fillRect(c.x+10, c.y-7, c.w-20, 9);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ground
  ctx.shadowColor = theme.glow;
  ctx.shadowBlur = 10;
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, GROUND_Y+2, W, 3);
  groundLines.forEach(l => {
    ctx.globalAlpha = 0.4;
    ctx.fillRect(l.x, GROUND_Y+7, l.w, 2);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  drawParticles();

  obstacles.forEach(o => {
    if (o.type === 'cactus') drawCactus(o);
    else drawBird(o);
  });

  dino.draw();
}

// ─── UPDATE ───────────────────────────────────────────────
function update() {
  frame++;
  score = Math.floor(frame / 6);
  speed = 4.8 + Math.floor(score / 250) * 0.9;

  checkTheme();
  checkMilestone(score);

  dino.update();
  updateParticles();

  clouds.forEach(c => { c.x -= c.spd; if (c.x + c.w < 0) { c.x = W+10; c.y = 25+Math.random()*55; c.w = 50+Math.random()*70; } });
  groundLines.forEach(l => { l.x -= speed; if (l.x + l.w < 0) l.x = W + Math.random()*80; });

  obstacleTimer++;
  if (obstacleTimer >= nextObstacleIn) {
    spawnObstacle();
    obstacleTimer = 0;
    nextObstacleIn = 90 + Math.floor(Math.random()*60) - Math.min(score/50, 30);
    nextObstacleIn = Math.max(nextObstacleIn, 55);
  }

  obstacles.forEach(o => {
    o.x -= speed;
    if (o.type === 'bird') { o.wingTimer++; if (o.wingTimer > 18) { o.wingUp = !o.wingUp; o.wingTimer = 0; } }
  });
  for (let i = obstacles.length-1; i >= 0; i--) { if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i,1); }

  const dr = dino.rect;
  for (const o of obstacles) {
    if (rectsOverlap(dr, { x:o.x+3, y:o.y, w:o.w-6, h:o.h })) { endGame(); return; }
  }
}

function updateScoreUI() {
  document.getElementById('score-display').textContent = String(score).padStart(6,'0');
  document.getElementById('hi-score').textContent = 'BEST: ' + String(hiScore).padStart(6,'0');
}

// ─── LOOP ─────────────────────────────────────────────────
function loop() {
  update();
  drawScene();
  updateScoreUI();
  if (gameRunning) raf = requestAnimationFrame(loop);
}

// ─── GAME CONTROL ─────────────────────────────────────────
function startGame() {
  score = 0; frame = 0; speed = 4.8;
  obstacles.length = 0; particles.length = 0;
  milestoneScores.clear();
  obstacleTimer = 0; nextObstacleIn = 90;
  themeIndex = 0; theme = themes[0];
  applyTheme(theme, false);
  dino.reset();
  gameRunning = true;
  document.getElementById('overlay').style.display = 'none';
  cancelAnimationFrame(raf);
  loop();
}

function endGame() {
  gameRunning = false;
  dino.dead = true;
  cancelAnimationFrame(raf);
  if (score > hiScore) hiScore = score;
  drawScene();
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-sub').textContent = `SCORE: ${String(score).padStart(6,'0')}  ·  BEST: ${String(hiScore).padStart(6,'0')}`;
  document.getElementById('start-btn').textContent = 'PLAY AGAIN';
  updateScoreUI();
}

// ─── INPUT ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.code==='Space'||e.code==='ArrowUp') && !gameRunning) { startGame(); return; }
  if (e.code==='Space'||e.code==='ArrowUp') dino.jump();
  if (e.code==='ArrowDown') dino.duck(true);
  e.preventDefault();
});
document.addEventListener('keyup', e => { if (e.code==='ArrowDown') dino.duck(false); });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameRunning) startGame(); else dino.jump();
}, { passive:false });

// ─── INIT ─────────────────────────────────────────────────
applyTheme(theme, false);
drawScene();
</script>
</body>
</html>
